<section id="contact" class="section contact-section">
  <h2 class="section-title">Contactez-moi</h2>
  <p class="section-subtitle">N'hésitez pas à me contacter pour discuter davantage de mes projets et compétences.</p>

  <div class="contact-content">
    <div class="contact-info">
      <div class="info-cards">
        <div *ngFor="let info of contactInfo" class="info-card">
          <div class="info-icon">{{ info.icon }}</div>
          <h3>{{ info.title }}</h3>
          <a [href]="info.link" class="info-value">{{ info.value }}</a>
        </div>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" class="contact-form">
      <div class="form-group">
        <label for="name">Nom</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          [(ngModel)]="contactForm.name" 
          required
          placeholder="Votre nom">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="contactForm.email" 
          required
          placeholder="votre.email@example.com">
      </div>

      <div class="form-group">
        <label for="subject">Sujet</label>
        <input 
          type="text" 
          id="subject" 
          name="subject" 
          [(ngModel)]="contactForm.subject" 
          required
          placeholder="Sujet de votre message">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea 
          id="message" 
          name="message" 
          [(ngModel)]="contactForm.message" 
          required
          rows="6"
          placeholder="Votre message..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Envoyer</button>
    </form>
  </div>
</section>

<footer class="footer">
  <div class="footer-content">
    <p>&copy; 2026 Mon Portfolio. Tous droits réservés.</p>
    <div class="footer-links">
      <a href="#">Mentions légales</a>
      <a href="#">Politique de confidentialité</a>
    </div>
  </div>
</footer>
